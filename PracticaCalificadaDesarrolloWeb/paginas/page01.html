<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page01</title>
  <link rel="stylesheet" href="../estilos/page01.css">
</head>
<body>
  <main class="window">
    <div class="topbar">
      <div class="dots"></div>
      <div class="icon-row">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4M12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Z"/></svg>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 3 6 7 1-5 5 1 8-6-4-6 4 1-8-5-5 7-1 3-6Z"/></svg>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 3h11v11H9zM4 9H3v12h12v-1"/></svg>
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m8 7-5 5 5 5M16 7l5 5-5 5"/></svg>
      </div>
    </div>

    <form class="form" autocomplete="off">
      <div class="field">
        <input id="name" type="text" required>
        <label for="name">Name</label>
      </div>
      <div class="field">
        <input id="email" type="email" required>
        <label for="email">E-mail</label>
      </div>
      <div class="field">
        <select id="item" required>
          <option value="" selected disabled></option>
          <option value="one">Item 1</option>
          <option value="two">Item 2</option>
          <option value="three">Item 3</option>
        </select>
        <label for="item">Item</label>
      </div>

      <label class="drop-zone" id="dropZone" for="imageInput">
        <input id="imageInput" type="file" accept="image/*">
        <svg class="img-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm2 11 3-3 2 2 4-4 3 5H6Zm4-6a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/></svg>
        <span id="imagePath">Arrastra una imagen aqui o haz click</span>
      </label>

      <label class="check-row">
        <input type="checkbox" id="agree">
        <span>Do you agree?</span>
      </label>

      <div class="actions">
        <button type="submit">SUBMIT</button>
        <button type="reset">CLEAR</button>
      </div>
    </form>
  </main>
  <script src="../scripts/page01.js"></script>
</body>
</html>
